<!-- templates/login_signup.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login & Signup</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #06b6d4);
    }

    .box {
      width: 400px;
      background: rgba(255,255,255,0.12);
      padding: 35px;
      border-radius: 20px;
      color: white;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>📰 Smart News App</h1>
    <p>Login to continue</p>

    <form method="GET" action="/home">
      <input type="email" placeholder="Enter Email" required>
      <input type="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="footer">
      Made by Mohit Charde
    </div>
  </div>

</body>
</html>
